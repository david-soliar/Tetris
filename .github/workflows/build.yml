name: Build Tetris


on:
  push:
    paths-ignore: ["**.md", "LICENSE"]
  pull_request:
    paths-ignore: ["**.md", "LICENSE"]


jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Build JAR
        run: mvn clean package

      - name: Create EXE
        shell: cmd
        run: |
          jpackage ^
            --name Tetris ^
            --input target ^
            --main-jar Tetris-1.0.0.jar ^
            --main-class davidsoliar.tetris.App ^
            --type exe ^
            --dest dist

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-Windows
          path: dist
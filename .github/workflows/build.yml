name: Build Tetris


on:
  push:
    paths-ignore: ["**.md", "LICENSE"]
  pull_request:
    paths-ignore: ["**.md", "LICENSE"]


jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            icon: src/main/resources/images/icon.ico
            name: Tetris-Windows

          - os: ubuntu-latest
            icon: src/main/resources/images/icon.png
            name: Tetris-Linux

          - os: macos-latest
            icon: src/main/resources/images/icon.icns
            name: Tetris-macOS-arm64

          - os: macos-15-intel
            icon: src/main/resources/images/icon.icns
            name: Tetris-macOS-x64

    runs-on: ${{ matrix.os }}

    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: version
        id: ver
        shell: bash
        run: |
          BASE=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)
          VERSION="$BASE.$GITHUB_RUN_NUMBER"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: build jar
        run: mvn clean package

      - name: copy runtime and dependencies
        run: mvn dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=deps

      - name: jlink and jpackage
        shell: bash
        run: |
          jlink \
            --module-path "%JAVA_HOME%\jmods:deps" \
            --add-modules javafx.controls \
            --output runtime \
            --strip-debug \
            --compress=zip-9 \
            --no-header-files \
            --no-man-pages

          jpackage \
            --name Tetris \
            --input target \
            --main-jar Tetris.jar \
            --main-class davidsoliar.tetris.App \
            --runtime-image runtime \
            --icon "${{ matrix.icon }}" \
            --type app-image \
            --dest dist

      - name: zip
        shell: bash
        run: |
          cd dist
          zip -r ../${{ matrix.name }}-${{ steps.ver.outputs.version }}.zip Tetris

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}-${{ steps.ver.outputs.version }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Tetris ${{ needs.build.outputs.version }}
          files: "**/*.zip"
